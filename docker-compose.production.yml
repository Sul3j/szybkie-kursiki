version: '3.8'

# Production configuration for Szybkie Kursiki
# Works with central nginx-proxy for SSL and routing

services:
  db:
    image: mysql:8.0
    container_name: kursiki-db
    command: ["--default-authentication-plugin=mysql_native_password"]
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - kursiki_db_data:/var/lib/mysql
    networks:
      - kursiki-internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: kursiki-web
    depends_on:
      db:
        condition: service_healthy
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DJANGO_DEBUG: ${DJANGO_DEBUG}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS}
      MYSQL_HOST: ${MYSQL_HOST:-db}
      MYSQL_PORT: ${MYSQL_PORT:-3306}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - kursiki_static_volume:/app/staticfiles
      - kursiki_media_volume:/app/media
    networks:
      - kursiki-internal
    restart: unless-stopped
    expose:
      - 8000

  nginx:
    image: nginx:alpine
    container_name: kursiki-nginx
    volumes:
      - ./nginx/app.conf:/etc/nginx/conf.d/default.conf:ro
      - kursiki_static_volume:/app/staticfiles:ro
      - kursiki_media_volume:/app/media:ro
    depends_on:
      - web
    networks:
      - kursiki-internal
      - szybkie-kursiki-net
    restart: unless-stopped
    expose:
      - 80

volumes:
  kursiki_db_data:
    name: kursiki_db_data
  kursiki_static_volume:
    name: kursiki_static_volume
  kursiki_media_volume:
    name: kursiki_media_volume

networks:
  kursiki-internal:
    name: kursiki-internal
    driver: bridge
  szybkie-kursiki-net:
    name: szybkie-kursiki-net
    driver: bridge
